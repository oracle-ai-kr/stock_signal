<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#080c12"><title>SIGNAL LAB</title>
<style>
:root{--bg:#080c12;--surface:#0d1420;--border:#1a2535;--accent:#00d4a0;--text:#c0d0e0;--muted:#506070;--mono:'Courier New',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:p 2s infinite;margin-right:8px;vertical-align:middle;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.logo{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--muted);margin-bottom:6px;}
.title{font-family:var(--mono);font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:4px;}
.sub{font-size:12px;color:var(--muted);margin-bottom:32px;font-family:var(--mono);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;width:100%;max-width:600px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;text-decoration:none;display:flex;align-items:center;gap:14px;transition:all .2s;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5);}
.ci{font-size:26px;flex-shrink:0;}
.cn{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:3px;}
.cd{font-size:11px;color:var(--muted);}
.ca{font-family:var(--mono);font-size:16px;color:var(--muted);flex-shrink:0;margin-left:auto;}
.footer{margin-top:28px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;}
</style></head><body>
<div class="logo">📦 SIGNAL LAB</div>

<a class="card" href="signal_lab_v20.html" style="border-color:#40e0d033;"><div class="ci">📃</div><div><div class="cn" style="color:#40e0d0">SIGNAL LAB V20</div><div class="cd">signal_lab_v20.html</div></div><div class="ca">→</div></a>
<a class="card" href="stock_signal.html" style="border-color:#4488ff33;"><div class="ci">📈</div><div><div class="cn" style="color:#4488ff">STOCK SIGNAL</div><div class="cd">stock_signal.html</div></div><div class="ca">→</div></a>
<a class="card" href="coin_signal.html" style="border-color:#ffc04033;"><div class="ci">🪙</div><div><div class="cn" style="color:#ffc040">COIN SIGNAL</div><div class="cd">coin_signal.html</div></div><div class="ca">→</div></a>
<a class="card" href="market_signal.html" style="border-color:#8888ff33;"><div class="ci">📋</div><div><div class="cn" style="color:#8888ff">MARKET SIGNAL</div><div class="cd">market_signal.html</div></div><div class="ca">→</div></a>
</div>

<div class="footer">SIGNAL LAB · GitHub Pages</div>
</body></html>
